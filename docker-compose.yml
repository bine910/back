version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: globex_postgres
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - back_postgres_data:/var/lib/postgresql/data

volumes:
  back_postgres_data:
    